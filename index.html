<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>제주 맛집 지도</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; }
  #app { display: flex; height: 100vh; overflow: hidden; }

  #sidebar { width: 340px; flex-shrink: 0; display: flex; flex-direction: column; background: #fff; border-right: 1px solid #e9ecef; z-index: 5; }
  #head { padding: 14px 16px 10px; border-bottom: 1px solid #f1f3f5; }
  #head h1 { font-size: 18px; font-weight: 800; color: #212529; }
  #head .sub { font-size: 12px; color: #868e96; margin-top: 3px; line-height: 1.4; }
  #search { width: 100%; margin-top: 10px; padding: 9px 12px; border: 1px solid #dee2e6; border-radius: 8px; font-size: 14px; outline: none; }
  #search:focus { border-color: #ff922b; }
  #filters { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 16px; border-bottom: 1px solid #f1f3f5; }
  .chip { font-size: 12px; padding: 5px 10px; border-radius: 999px; border: 1px solid #dee2e6; background: #fff; cursor: pointer; color: #495057; user-select: none; transition: .12s; }
  .chip.on { color: #fff; border-color: transparent; font-weight: 600; }
  #list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .item { padding: 11px 16px; border-bottom: 1px solid #f8f9fa; cursor: pointer; }
  .item:hover { background: #fff9db; }
  .item .nm { font-size: 14px; font-weight: 700; color: #212529; display: flex; align-items: center; gap: 6px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .item .mn { font-size: 12px; color: #495057; margin-top: 3px; }
  .item .ad { font-size: 11px; color: #adb5bd; margin-top: 2px; }
  #count { padding: 8px 16px; font-size: 12px; color: #868e96; background: #f8f9fa; }

  #map { flex: 1; position: relative; }

  .iw { padding: 12px 14px; min-width: 200px; max-width: 250px; }
  .iw .t { font-size: 15px; font-weight: 800; color: #212529; }
  .iw .badge { display: inline-block; font-size: 11px; color: #fff; padding: 2px 8px; border-radius: 999px; margin: 6px 0; }
  .iw .m { font-size: 13px; color: #343a40; line-height: 1.4; }
  .iw .a { font-size: 12px; color: #868e96; margin-top: 4px; line-height: 1.4; }
  .iw a.kbtn { display: block; text-align: center; margin-top: 9px; padding: 8px; background: #fae100; color: #3c1e1e; font-weight: 700; font-size: 13px; border-radius: 7px; text-decoration: none; }

  #toggle { display: none; position: absolute; top: 12px; left: 12px; z-index: 6; background: #fff; border: 1px solid #dee2e6; border-radius: 8px; padding: 9px 13px; font-size: 13px; font-weight: 700; box-shadow: 0 2px 8px rgba(0,0,0,.12); cursor: pointer; }

  @media (max-width: 720px) {
    #sidebar { position: absolute; top: 0; left: 0; height: 100%; transform: translateX(-100%); transition: transform .25s; box-shadow: 2px 0 16px rgba(0,0,0,.18); width: 86%; max-width: 360px; }
    #sidebar.open { transform: translateX(0); }
    #toggle { display: block; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="head">
      <h1>제주 맛집 지도</h1>
      <div class="sub">총 <b id="total">0</b>곳 · 마커를 누르면 카카오맵 평점/리뷰로 연결돼요</div>
      <input id="search" type="text" placeholder="상호/메뉴 검색 (예: 갈치, 흑돼지)">
    </div>
    <div id="filters"></div>
    <div id="count"></div>
    <div id="list"></div>
  </div>
  <div id="map">
    <button id="toggle">&#9776; 목록</button>
  </div>
</div>

const CAT_COLOR = {
  "흑돼지·고기": "#e8590c",
  "해산물·회":   "#1c7ed6",
  "면·국물":     "#f59f00",
  "카페·베이커리":"#9c36b5",
  "세계요리":    "#2f9e44",
  "기타":        "#868e96"
};

let map, clusterer, infowindow, geocoder, places;
let markers = [];
let activeCats = new Set(Object.keys(CAT_COLOR));
let query = "";

function pinSVG(color){
  const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="26" height="34" viewBox="0 0 26 34">'
    + '<path d="M13 0C5.8 0 0 5.8 0 13c0 9 13 21 13 21s13-12 13-21C26 5.8 20.2 0 13 0z" fill="' + color + '"/>'
    + '<circle cx="13" cy="13" r="5" fill="#fff"/></svg>';
  return "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svg)));
}

function initMap(){
  map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(33.40, 126.55),
    level: 10
  });
  clusterer = new kakao.maps.MarkerClusterer({ map: map, averageCenter: true, minLevel: 8 });
  infowindow = new kakao.maps.InfoWindow({ removable: true, zIndex: 100 });
  places = new kakao.maps.services.Places();
  geocoder = new kakao.maps.services.Geocoder();

  buildFilters();
  document.getElementById('total').textContent = RESTAURANTS.length;
  document.getElementById('search').addEventListener('input', function(e){ query = e.target.value.trim(); render(); });
  document.getElementById('toggle').addEventListener('click', function(){
    document.getElementById('sidebar').classList.toggle('open'); });

  geocodeAll();
}

function geocodeAll(){
  let i = 0;
  function next(){
    if (i >= RESTAURANTS.length){ render(); return; }
    const r = RESTAURANTS[i]; const idx = i; i++;
    places.keywordSearch(r.name + " 제주", function(res, status){
      if (status === kakao.maps.services.Status.OK && res.length){
        let hit = null;
        for (let k=0;k<res.length;k++){ if ((res[k].address_name||"").indexOf("제주")>=0){ hit=res[k]; break; } }
        if (!hit) hit = res[0];
        addMarker(r, parseFloat(hit.y), parseFloat(hit.x), hit.place_url, hit.road_address_name || hit.address_name);
        if (idx % 5 === 0) render();
        setTimeout(next, 120);
      } else {
        geocoder.addressSearch(cleanAddr(r.addr), function(gres, gstatus){
          if (gstatus === kakao.maps.services.Status.OK && gres.length){
            addMarker(r, parseFloat(gres[0].y), parseFloat(gres[0].x), null, null);
          } else {
            addMarker(r, null, null, null, null);
          }
          if (idx % 5 === 0) render();
          setTimeout(next, 120);
        });
      }
    });
  }
  next();
}

function cleanAddr(a){ return a.split("/")[0].replace(/\(.*?\)/g,"").trim(); }

function addMarker(r, lat, lng, place_url, foundAddr){
  const entry = { data: r, marker: null, place_url: place_url, foundAddr: foundAddr, lat: lat, lng: lng };
  if (lat && lng){
    const marker = new kakao.maps.Marker({
      position: new kakao.maps.LatLng(lat, lng),
      image: new kakao.maps.MarkerImage(pinSVG(CAT_COLOR[r.cat]||"#868e96"),
              new kakao.maps.Size(26,34), { offset: new kakao.maps.Point(13,34) }),
      title: r.name
    });
    kakao.maps.event.addListener(marker, 'click', function(){ openInfo(entry); });
    entry.marker = marker;
  }
  markers.push(entry);
}

function kakaoLink(e){
  return e.place_url || ("https://map.kakao.com/?q=" + encodeURIComponent(e.data.name + " 제주"));
}

function openInfo(e){
  if (!e.marker) return;
  const r = e.data, color = CAT_COLOR[r.cat]||"#868e96";
  const html = '<div class="iw">'
    + '<div class="t">' + r.name + '</div>'
    + '<span class="badge" style="background:' + color + '">' + r.cat + '</span>'
    + '<div class="m">' + r.menu + '</div>'
    + '<div class="a">' + (e.foundAddr || r.addr) + '</div>'
    + '<a class="kbtn" href="' + kakaoLink(e) + '" target="_blank" rel="noopener">카카오맵에서 평점/리뷰 보기 &rarr;</a>'
    + '</div>';
  infowindow.setContent(html);
  infowindow.open(map, e.marker);
  map.panTo(e.marker.getPosition());
}

function buildFilters(){
  const box = document.getElementById('filters');
  Object.keys(CAT_COLOR).forEach(function(cat){
    const c = document.createElement('div');
    c.className = 'chip on';
    c.textContent = cat;
    c.style.background = CAT_COLOR[cat];
    c.onclick = function(){
      if (activeCats.has(cat)){ activeCats.delete(cat); c.classList.remove('on'); c.style.background='#fff'; }
      else { activeCats.add(cat); c.classList.add('on'); c.style.background=CAT_COLOR[cat]; }
      render();
    };
    box.appendChild(c);
  });
}

function visible(e){
  const r = e.data;
  if (!activeCats.has(r.cat)) return false;
  if (query && !(r.name.indexOf(query)>=0 || r.menu.indexOf(query)>=0 || r.addr.indexOf(query)>=0)) return false;
  return true;
}

function render(){
  const shown = markers.filter(function(e){ return e.marker && visible(e); });
  clusterer.clear();
  clusterer.addMarkers(shown.map(function(e){ return e.marker; }));

  const listEl = document.getElementById('list');
  const all = markers.filter(visible);
  listEl.innerHTML = "";
  all.forEach(function(e){
    const r = e.data;
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = '<div class="nm"><span class="dot" style="background:' + CAT_COLOR[r.cat] + '"></span>' + r.name
        + (e.marker ? "" : ' <span style="font-size:10px;color:#fa5252">·위치미확인</span>') + '</div>'
      + '<div class="mn">' + r.menu + '</div><div class="ad">' + (e.foundAddr || r.addr) + '</div>';
    div.onclick = function(){
      if (e.marker){ openInfo(e); document.getElementById('sidebar').classList.remove('open'); }
      else { window.open(kakaoLink(e), '_blank'); }
    };
    listEl.appendChild(div);
  });
  document.getElementById('count').textContent =
    all.length + "곳 표시중" + (markers.length < RESTAURANTS.length ? " (위치 불러오는 중... " + markers.length + "/" + RESTAURANTS.length + ")" : "");
}

(function loadSDK(){
  if (KAKAO_JS_KEY.indexOf("PASTE") === 0){
    document.getElementById('map').innerHTML =
      '<div style="padding:40px;font-size:15px;line-height:1.7;color:#495057">⚠️ <b>카카오 JavaScript 키를 먼저 넣어주세요.</b><br>이 HTML 파일을 열어 <code>KAKAO_JS_KEY</code> 값을 발급받은 키로 바꾸면 지도가 나타납니다.</div>';
    return;
  }
  const s = document.createElement('script');
  s.src = "https://dapi.kakao.com/v2/maps/sdk.js?appkey=" + KAKAO_JS_KEY + "&libraries=services,clusterer&autoload=false";
  s.onload = function(){ kakao.maps.load(initMap); };
  document.head.appendChild(s);
})();
</script>
